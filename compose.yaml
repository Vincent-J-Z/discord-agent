# Docker Compose deployment (the Docker twin of run-container.sh).
#
#   DISCORD_AGENT_SOURCE_HOST=/path/to/repo \
#   DISCORD_AGENT_WORKSPACE_HOST=/path/to/workspace \
#   docker compose up -d --build
#
# Two bind mounts, same contract as the Apple-container deployment:
#   /app       -> this source tree (writable — the agent edits its own code,
#                 host is the source of truth; hot-reload picks up changes)
#   /workspace -> runtime state + the operative .env (tokens, ids, config)
#
# The container runs as the image's `agent` user (uid 10001) with passwordless
# sudo INSIDE the container — the container is the isolation boundary. Make the
# two host dirs writable by uid 10001 (e.g. `sudo chown -R 10001 <dirs>`).
services:
  discord-agent:
    build:
      context: .
      dockerfile: Containerfile
      args:
        # Match the owner of the bind-mounted dirs: AGENT_UID=$(id -u)
        AGENT_UID: ${AGENT_UID:-10001}
    image: discord-agent:local
    container_name: discord-agent
    working_dir: /app
    user: agent
    init: true
    restart: unless-stopped
    cpus: ${AGENT_CPUS:-6}
    mem_limit: ${AGENT_MEM:-6g}
    environment:
      DISCORD_AGENT_WORKSPACE: /workspace
      HOME: /home/agent
      TMPDIR: /workspace/tmp
      CLAUDE_CWD: /app
    volumes:
      - ${DISCORD_AGENT_SOURCE_HOST:-.}:/app
      - ${DISCORD_AGENT_WORKSPACE_HOST:-${HOME}/discordAgentWorkspace}:/workspace
    command: ["python", "src/discord_agent_runtime.py"]
